<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poké Champion 終極聯防模擬器 (Meta威脅排序版)</title>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-sec: #94a3b8;
            --accent: #fbbf24; --danger: #ef4444; --success: #22c55e; --ability: #6ee7b7; --border: #334155; --input-bg: #0b1120;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        h1 { text-align: center; color: var(--accent); border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        
        /* 天氣控制面板 */
        .weather-panel { background-color: var(--card-bg); padding: 15px 25px; border-radius: 12px; border: 1px solid var(--border); max-width: 1050px; margin: 0 auto 25px auto; display: flex; align-items: center; justify-content: center; gap: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); flex-wrap: wrap;}
        .weather-title { font-weight: bold; color: var(--text-sec); margin-right: 10px; }
        .weather-label { cursor: pointer; padding: 8px 15px; border-radius: 20px; background: #334155; transition: 0.2s; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .weather-label input { display: none; }
        .weather-label:hover { background: #475569; }
        input:checked + .w-none { background: #94a3b8; color: #0f172a; font-weight: bold; }
        input:checked + .w-sun { background: #f59e0b; color: #fff; font-weight: bold; }
        input:checked + .w-rain { background: #3b82f6; color: #fff; font-weight: bold; }
        input:checked + .w-sand { background: #d97706; color: #fff; font-weight: bold; }
        input:checked + .w-snow { background: #38bdf8; color: #fff; font-weight: bold; }

        .container { max-width: 1100px; margin: 0 auto; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .pokemon-card { background-color: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .slot-title { font-size: 16px; color: var(--accent); margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 8px;}
        
        /* 實體內嵌搜尋區塊 */
        .search-area { margin-bottom: 15px; }
        input[type="text"] { width: 100%; padding: 12px; background-color: var(--input-bg); color: white; border: 1px solid #475569; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        input[type="text"]:focus { outline: none; border-color: var(--accent); }
        .dropdown-list { max-height: 220px; overflow-y: auto; background-color: #162032; border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; display: none; margin-top: -4px;}
        .dropdown-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #2a3649; transition: background 0.2s; }
        .dropdown-item:hover { background-color: #3b82f6; color: white; font-weight: bold; }

        .btn-reselect { background: #334155; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; float: right; margin-top: -35px; position: relative; z-index: 10; transition: background 0.2s;}
        .btn-reselect:hover { background: #ef4444; }

        .tags span { display: inline-block; padding: 5px 12px; border-radius: 6px; font-size: 14px; margin-right: 6px; margin-bottom: 8px; font-weight: 500; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .section-title { font-size: 13px; color: var(--text-sec); margin-top: 15px; margin-bottom: 8px; }
        
        .toggle-btn { display: flex; align-items: center; margin-top: 10px; padding: 10px; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .toggle-mega { background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.3); margin-bottom: 10px;}
        .toggle-ability { background: rgba(110, 231, 183, 0.1); border: 1px solid rgba(110, 231, 183, 0.3); margin-bottom: 15px;}
        .toggle-btn input { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }
        
        /* 下拉式推薦聯防系統 UI */
        .recommendation-box { background: rgba(59, 130, 246, 0.1); border: 1px dashed #3b82f6; border-radius: 8px; padding: 12px; margin-top: 15px; }
        .rec-select { width: 100%; padding: 10px; background-color: #1e3a8a; color: #bfdbfe; border: 1px solid #3b82f6; border-radius: 6px; font-size: 14px; cursor: pointer; outline: none; margin-top: 5px; }
        .rec-select:hover { border-color: #60a5fa; background-color: #1e40af; }
        .rec-select option { background-color: #0f172a; color: #f8fafc; font-size: 14px; padding: 5px;}
        
        .weather-note { background: #475569; color: #f8fafc; font-size: 12px; padding: 4px 8px; border-radius: 4px; margin-bottom: 8px; display: inline-block; }

        .analysis-board { background-color: var(--card-bg); border-radius: 12px; padding: 25px; border: 1px solid var(--border); }
        .alert-danger { color: #fca5a5; background: rgba(239, 68, 68, 0.15); padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid var(--danger); line-height: 1.5; }
        .alert-success { color: #86efac; background: rgba(34, 197, 94, 0.15); padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 5px solid var(--success); line-height: 1.5; }
        .empty-state { color: var(--text-sec); font-style: italic; text-align: center; padding: 20px; }
        
        /* 威脅標籤 UI */
        .threat-tag { background: rgba(239, 68, 68, 0.2); border: 1px solid #ef4444; color: #fca5a5; padding: 3px 8px; border-radius: 4px; font-size: 13px; margin: 3px 4px 3px 0; display: inline-block; }
        .threat-hot { background: rgba(239, 68, 68, 0.5); border-color: #f87171; color: #ffffff; font-weight: bold; box-shadow: 0 0 5px rgba(239,68,68,0.5);}

        /* 18 屬性顏色 */
        .type-一般 { background-color: #A8A77A; color: #fff; } .type-火 { background-color: #EE8130; color: #fff; }
        .type-水 { background-color: #6390F0; color: #fff; } .type-草 { background-color: #7AC74C; color: #fff; }
        .type-電 { background-color: #F7D02C; color: #000; text-shadow: none !important;} .type-冰 { background-color: #96D9D6; color: #000; text-shadow: none !important;}
        .type-格鬥 { background-color: #C22E28; color: #fff; } .type-毒 { background-color: #A33EA1; color: #fff; }
        .type-地面 { background-color: #E2BF65; color: #000; text-shadow: none !important;} .type-飛行 { background-color: #A98FF3; color: #fff; }
        .type-超能力 { background-color: #F95587; color: #fff; } .type-蟲 { background-color: #A6B91A; color: #fff; }
        .type-岩石 { background-color: #B6A136; color: #fff; } .type-幽靈 { background-color: #735797; color: #fff; }
        .type-龍 { background-color: #6F35FC; color: #fff; } .type-惡 { background-color: #705746; color: #fff; }
        .type-鋼 { background-color: #B7B7CE; color: #000; text-shadow: none !important;} .type-妖精 { background-color: #D685AD; color: #000; text-shadow: none !important;}
        .tag-immune { background-color: #166534; color: #bbf7d0; border: 1px solid #22c55e; }
        .tag-weak { background-color: #7f1d1d; color: #fca5a5; border: 1px solid #ef4444; }
        .tag-none { background-color: #334155; color: #cbd5e1; }
        
        .speed-select { background: #0b1120; color: #f8fafc; border: 1px solid #475569; padding: 8px; border-radius: 6px; outline: none; font-size: 14px; width: 100%; box-sizing: border-box; }
        .speed-select:focus { border-color: var(--accent); }
        .speed-label { display: flex; align-items: center; gap: 8px; color: #cbd5e1; font-size: 14px; cursor: pointer; }

        /* 右下角懸浮總容器 */
        .floating-container { position: fixed; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        
        /* 懸浮導覽列 */
        .floating-nav { display: flex; flex-direction: column; gap: 12px; }
        .nav-btn { color: white; border: none; padding: 12px 20px; border-radius: 30px; cursor: pointer; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.2s, opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .nav-btn:hover { transform: translateY(-3px); opacity: 0.9; }
        .nav-defense { background: linear-gradient(135deg, #059669, #10b981); }
        .nav-speed { background: linear-gradient(135deg, #2563eb, #3b82f6); }

        /* 創作者標籤區 */
        .creator-panel { display: flex; flex-direction: column; gap: 10px; }
        .creator-tag { display: flex; align-items: center; gap: 8px; text-decoration: none; color: white; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.2s, filter 0.2s; }
        .creator-tag:hover { transform: translateY(-2px); filter: brightness(1.15); }
        .tag-twitch { background: #9146FF; }
        .tag-youtube { background: #FF0000; }

        /* 分隔線 */
        .nav-divider { width: 80%; height: 2px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto; }

        /* 響應式佈局 RWD (小螢幕與手機適配) */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 22px; padding-bottom: 10px; margin-bottom: 15px; }
            
            /* 天氣面板適配 */
            .weather-panel { padding: 12px 15px; gap: 8px; justify-content: flex-start; }
            .weather-title { width: 100%; margin-bottom: 5px; }
            .weather-label { font-size: 13px; padding: 6px 12px; }

            /* 隊伍網格單欄顯示 */
            .team-grid { grid-template-columns: 1fr; gap: 15px; }
            .pokemon-card { padding: 15px; }
            .slot-title { font-size: 15px; }

            /* 單挑面板適配 */
            #speed-board-section > div { flex-direction: column; }
            #speed-board-section > div > div { min-width: 100% !important; margin-bottom: 10px; }

            /* 聯防分析面板內距 */
            .analysis-board { padding: 15px; }

            /* 右下角懸浮按鈕縮小 */
            .floating-container { right: 10px; bottom: 15px; gap: 10px; transform: scale(0.85); transform-origin: bottom right;}
            .creator-tag { padding: 6px 12px; font-size: 12px; }
            .nav-btn { padding: 10px 16px; font-size: 13px; }
            .btn-reselect { font-size: 12px; padding: 6px 10px; margin-top: -30px; }
        }
    </style>
</head>
<body>

    <!-- 右下角懸浮操作區 -->
    <div class="floating-container">
        <!-- 創作者標籤 -->
        <div class="creator-panel">
            <a href="https://www.twitch.tv/fable165469" target="_blank" class="creator-tag tag-twitch" title="前往 Twitch 實況台">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/>
                </svg>
                冷颯製作
            </a>
            <a href="https://www.youtube.com/@LengSa" target="_blank" class="creator-tag tag-youtube" title="前往 YouTube 頻道">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.377.55a3.016 3.016 0 0 0-2.122 2.136C0 8.07 0 12 0 12s0 3.93.501 5.814a3.016 3.016 0 0 0 2.122 2.136c1.872.55 9.377.55 9.377.55s7.505 0 9.377-.55a3.016 3.016 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                </svg>
                冷颯製作
            </a>
        </div>
        
        <div class="nav-divider"></div>

        <!-- 懸浮導覽按鈕 -->
        <div class="floating-nav">
            <button class="nav-btn nav-defense" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">🛡️ 回到隊伍選擇</button>
            <button class="nav-btn nav-speed" onclick="document.getElementById('speed-board-section').scrollIntoView({behavior: 'smooth'})">⚡ 速度計算區</button>
        </div>
    </div>

    <h1>🏆 Poké Champion 終極聯防模擬器</h1>

    <div class="weather-panel">
        <div class="weather-title">環境天氣：</div>
        <label><input type="radio" name="weather" value="none" checked onchange="changeWeather()"><span class="weather-label w-none">無天氣</span></label>
        <label><input type="radio" name="weather" value="sun" onchange="changeWeather()"><span class="weather-label w-sun">☀️ 晴天</span></label>
        <label><input type="radio" name="weather" value="rain" onchange="changeWeather()"><span class="weather-label w-rain">🌧️ 雨天</span></label>
        <label><input type="radio" name="weather" value="sand" onchange="changeWeather()"><span class="weather-label w-sand">🌪️ 沙暴</span></label>
        <label><input type="radio" name="weather" value="snow" onchange="changeWeather()"><span class="weather-label w-snow">❄️ 降雪</span></label>
    </div>

<div class="container">
    <div class="team-grid" id="team-grid">
        <div class="pokemon-card">
            <div class="slot-title">📍 隊員 1 (Member)</div>
            <div id="search-box-0" class="search-area">
                <input type="text" id="input-0" autocomplete="off" placeholder="點擊以展開名單，或注音搜尋...">
                <div id="dropdown-0" class="dropdown-list"></div>
            </div>
            <div id="data-area-0" style="display:none;"></div>
        </div>
        <div class="pokemon-card">
            <div class="slot-title">📍 隊員 2 (Member)</div>
            <div id="search-box-1" class="search-area">
                <input type="text" id="input-1" autocomplete="off" placeholder="點擊以展開名單，或注音搜尋...">
                <div id="dropdown-1" class="dropdown-list"></div>
            </div>
            <div id="data-area-1" style="display:none;"></div>
        </div>
        <div class="pokemon-card">
            <div class="slot-title">📍 隊員 3 (Member)</div>
            <div id="search-box-2" class="search-area">
                <input type="text" id="input-2" autocomplete="off" placeholder="點擊以展開名單，或注音搜尋...">
                <div id="dropdown-2" class="dropdown-list"></div>
            </div>
            <div id="data-area-2" style="display:none;"></div>
        </div>
        <div class="pokemon-card">
            <div class="slot-title">📍 隊員 4 (Member)</div>
            <div id="search-box-3" class="search-area">
                <input type="text" id="input-3" autocomplete="off" placeholder="點擊以展開名單，或注音搜尋...">
                <div id="dropdown-3" class="dropdown-list"></div>
            </div>
            <div id="data-area-3" style="display:none;"></div>
        </div>
        <div class="pokemon-card">
            <div class="slot-title">📍 隊員 5 (Member)</div>
            <div id="search-box-4" class="search-area">
                <input type="text" id="input-4" autocomplete="off" placeholder="點擊以展開名單，或注音搜尋...">
                <div id="dropdown-4" class="dropdown-list"></div>
            </div>
            <div id="data-area-4" style="display:none;"></div>
        </div>
        <div class="pokemon-card">
            <div class="slot-title">📍 隊員 6 (Member)</div>
            <div id="search-box-5" class="search-area">
                <input type="text" id="input-5" autocomplete="off" placeholder="點擊以展開名單，或注音搜尋...">
                <div id="dropdown-5" class="dropdown-list"></div>
            </div>
            <div id="data-area-5" style="display:none;"></div>
        </div>
    </div>

    <div id="defense-board-section" class="analysis-board">
        <h2 style="margin-top: 0; color: #e2e8f0; font-size: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px;">📊 全隊戰術聯防分析報告</h2>
        <div id="analysis-content"><div class="empty-state">請在上方選擇至少 2 隻寶可夢，系統將結合「屬性、特性、天氣」自動分析...</div></div>
    </div>

    <!-- 1v1 速度單挑面板 -->
    <div id="speed-board-section" class="analysis-board" style="margin-top: 25px;">
        <h2 style="margin-top: 0; color: #e2e8f0; font-size: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px;">⚡ 1v1 速度單挑計算機 (含特性、技能、狀態、性格與努力值)</h2>
        
        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
            <!-- Left Side (我方) -->
            <div style="flex: 1; min-width: 300px; background: rgba(59, 130, 246, 0.1); border: 1px solid #3b82f6; border-radius: 8px; padding: 15px;">
                <h3 style="margin-top: 0; color: #bfdbfe;">🟦 我方寶可夢</h3>
                <div class="search-area" style="margin-bottom: 10px;">
                    <input type="text" id="speed-input-left" autocomplete="off" placeholder="搜尋我方寶可夢...">
                    <div id="speed-dropdown-left" class="dropdown-list"></div>
                </div>
                <div id="speed-data-left" style="display: none; flex-direction: column; gap: 10px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size: 18px; font-weight: bold; color: #f8fafc;" id="speed-name-left">-</span>
                        <button class="btn-reselect" style="margin: 0; float: none; position: static;" onclick="reselectSpeedPokemon('left')">✖ 重新選擇</button>
                    </div>
                    <label class="speed-label"><input type="checkbox" id="speed-mega-left" onchange="calcSpeedDuel()"> ✨ 觸發 Mega 進化</label>
                    <select class="speed-select" id="speed-effort-left" onchange="calcSpeedDuel()">
                        <option value="max+">極速 (+性格 252努力)</option>
                        <option value="max">滿速 (無加成 252努力)</option>
                        <option value="zero">無練 (無加成 0努力)</option>
                        <option value="min">極慢 (-性格 0努力)</option>
                    </select>
                    <select class="speed-select" id="speed-stage-left" onchange="calcSpeedDuel()">
                        <option value="6">+6</option>
                        <option value="5">+5</option>
                        <option value="4">+4</option>
                        <option value="3">+3</option>
                        <option value="2">+2 (例: 破殼/高移)</option>
                        <option value="1">+1 (例: 龍舞/圍巾)</option>
                        <option value="0" selected>階級變化 ±0</option>
                        <option value="-1">-1 (例: 被冰凍之風)</option>
                        <option value="-2">-2 (例: 被吐絲)</option>
                        <option value="-3">-3</option>
                        <option value="-4">-4</option>
                        <option value="-5">-5</option>
                        <option value="-6">-6</option>
                    </select>
                    <select class="speed-select" id="speed-ability-left" onchange="calcSpeedDuel()">
                        <option value="1">無特性/道具加速</option>
                        <option value="1.5">古代活性/夸克充能 (x1.5)</option>
                        <option value="2">天氣加速/輕裝等 (x2)</option>
                    </select>
                    <label class="speed-label" style="color: #fca5a5;"><input type="checkbox" id="speed-para-left" onchange="calcSpeedDuel()"> ⚡ 麻痺狀態 (速度減半)</label>
                </div>
            </div>

            <!-- Right Side (敵方) -->
            <div style="flex: 1; min-width: 300px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 8px; padding: 15px;">
                <h3 style="margin-top: 0; color: #fecaca;">🟥 敵方寶可夢</h3>
                <div class="search-area" style="margin-bottom: 10px;">
                    <input type="text" id="speed-input-right" autocomplete="off" placeholder="搜尋敵方寶可夢...">
                    <div id="speed-dropdown-right" class="dropdown-list"></div>
                </div>
                <div id="speed-data-right" style="display: none; flex-direction: column; gap: 10px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size: 18px; font-weight: bold; color: #f8fafc;" id="speed-name-right">-</span>
                        <button class="btn-reselect" style="margin: 0; float: none; position: static;" onclick="reselectSpeedPokemon('right')">✖ 重新選擇</button>
                    </div>
                    <label class="speed-label"><input type="checkbox" id="speed-mega-right" onchange="calcSpeedDuel()"> ✨ 觸發 Mega 進化</label>
                    <select class="speed-select" id="speed-effort-right" onchange="calcSpeedDuel()">
                        <option value="max+">極速 (+性格 252努力)</option>
                        <option value="max">滿速 (無加成 252努力)</option>
                        <option value="zero">無練 (無加成 0努力)</option>
                        <option value="min">極慢 (-性格 0努力)</option>
                    </select>
                    <select class="speed-select" id="speed-stage-right" onchange="calcSpeedDuel()">
                        <option value="6">+6</option>
                        <option value="5">+5</option>
                        <option value="4">+4</option>
                        <option value="3">+3</option>
                        <option value="2">+2 (例: 破殼/高移)</option>
                        <option value="1">+1 (例: 龍舞/圍巾)</option>
                        <option value="0" selected>階級變化 ±0</option>
                        <option value="-1">-1 (例: 被冰凍之風)</option>
                        <option value="-2">-2 (例: 被吐絲)</option>

        const match = item.match(/^([^\(]+)\(([^\)]+)\)(?:\[(M(?::([^\]]+))?)\])?$/);
        if (match) {
            const name = match[1];
            pokemonNames.push(name);
            const types = match[2].split('/');
            pokedex[name] = { types: types, mega: null };
            if (match[3]) {
                let megaTypes = types;
                if (match[4]) megaTypes = match[4].split('/');
                pokedex[name].mega = { types: megaTypes };
                
                if (name === "噴火龍") {
                    pokedex[name].megaForms = {
                        "X": { types: ["火", "龍"] },
                        "Y": { types: ["火", "飛行"] }
                    };
                }
            }
        }
    });
    pokemonNames.sort();

    [0, 1, 2, 3, 4, 5].forEach(index => {
        const input = document.getElementById(`input-${index}`);
        const dropdown = document.getElementById(`dropdown-${index}`);
        
        function updateList() {
            dropdown.innerHTML = '';
            const val = input.value.trim().toLowerCase();
            let count = 0;
            for (let i = 0; i < pokemonNames.length; i++) {
                if (isPokemonInTeam(pokemonNames[i], index)) continue;

                if (pokemonNames[i].toLowerCase().includes(val) || val === '') {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    let name = pokemonNames[i];
                    if (val !== "") {
                        const regex = new RegExp(`(${val})`, "gi");
                        name = name.replace(regex, "<span style='color:var(--accent);'>$1</span>");
                    }
                    div.innerHTML = name;
                    div.onclick = function() { selectPokemon(index, pokemonNames[i]); };
                    dropdown.appendChild(div);
                    count++;
                }
            }
            dropdown.style.display = count > 0 ? 'block' : 'none';
        }

        let isComposing = false;
        input.addEventListener('compositionstart', () => isComposing = true);
        input.addEventListener('compositionend', () => { isComposing = false; updateList(); });
        input.addEventListener('input', () => { if(!isComposing) updateList(); });
        input.addEventListener('focus', updateList);
    });

    document.addEventListener("click", function(e) {
        if(!e.target.closest('.search-area')) {
            document.querySelectorAll('.dropdown-list').forEach(el => el.style.display = 'none');
        }
    });

    function selectPokemon(index, name) {
        if (isPokemonInTeam(name, index)) {
            alert(`⚠️ 「${name}」已經在隊伍中了，根據規則請選擇其他寶可夢！`);
            document.getElementById(`input-${index}`).value = '';
            return;
        }

        team[index].name = name;
        team[index].isMega = false;
        team[index].isAbility = true;

        undoHistory[index] = null;
        let undoBtn = document.getElementById(`undo-btn-${index}`);
        if (undoBtn) undoBtn.style.display = 'none';

        document.getElementById(`search-box-${index}`).style.display = 'none';
        document.getElementById(`data-area-${index}`).style.display = 'block';
        renderDataArea(index);
        analyzeTeam();
    }

    function reselectPokemon(index) {
        if (team[index].name !== "") {
            undoHistory[index] = { ...team[index] };
        }

        team[index].name = "";
        document.getElementById(`search-box-${index}`).style.display = 'block';
        document.getElementById(`input-${index}`).value = '';
        document.getElementById(`data-area-${index}`).style.display = 'none';

        let undoBtn = document.getElementById(`undo-btn-${index}`);
        if (!undoBtn) {
            undoBtn = document.createElement('button');
            undoBtn.id = `undo-btn-${index}`;
            undoBtn.style.cssText = "display: none; margin-top: 8px; width: 100%; padding: 6px; background: #475569; color: #f8fafc; border: none; border-radius: 4px; cursor: pointer;";
            undoBtn.onmouseover = () => undoBtn.style.background = '#64748b';
            undoBtn.onmouseout = () => undoBtn.style.background = '#475569';
            undoBtn.onclick = () => undoReselect(index);
            const searchBox = document.getElementById(`search-box-${index}`);
            searchBox.insertBefore(undoBtn, document.getElementById(`dropdown-${index}`));
        }

        if (undoHistory[index]) {
            undoBtn.style.display = 'block';
            undoBtn.innerHTML = `↩️ 復原上一隻 (${undoHistory[index].name})`;
        }

        analyzeTeam();
    }

    window.undoReselect = function(index) {
        if (!undoHistory[index]) return;
        team[index] = { ...undoHistory[index] };
        undoHistory[index] = null;
        
        let undoBtn = document.getElementById(`undo-btn-${index}`);
        if (undoBtn) undoBtn.style.display = 'none';

        document.getElementById(`search-box-${index}`).style.display = 'none';
        document.getElementById(`data-area-${index}`).style.display = 'block';
        
        renderDataArea(index);
        analyzeTeam();
    };

    window.autoFillPokemon = function(name) {
        let emptyIndex = team.findIndex(slot => slot.name === "");
        if (emptyIndex !== -1) {
            selectPokemon(emptyIndex, name);
        } else {
            alert("隊伍的 6 格已經全滿了！請先點擊任一寶可夢右上角的「✖ 重新選擇」來騰出空間。");
        }
    };

    function toggleMega(index, isChecked) { 
        if (isChecked) {
            let existingMegaIndex = team.findIndex((slot, i) => i !== index && slot.isMega);
            if (existingMegaIndex !== -1) {
                alert("⚠️ 隊伍中只能有一隻寶可夢進行超級進化 (Mega Evolution)！\n已自動取消原先的 Mega 狀態。");
                team[existingMegaIndex].isMega = false;
                renderDataArea(existingMegaIndex);
            }
        }
        team[index].isMega = isChecked; 
        renderDataArea(index); 
        analyzeTeam(); 
    }
    
    function toggleAbility(index, isChecked) { team[index].isAbility = isChecked; renderDataArea(index); analyzeTeam(); }

    window.changeMegaForm = function(index, form) {
        team[index].megaForm = form;
        renderDataArea(index);
        analyzeTeam();
    };

    function getActiveData(slot) {
        const baseData = pokedex[slot.name];
        let currentTypes = baseData.types;
        if (slot.isMega && baseData.megaForms) {
            currentTypes = baseData.megaForms[slot.megaForm || 'Y'].types;
        } else if (slot.isMega && baseData.mega) {
            currentTypes = baseData.mega.types;
        }
        let activeMatchup = calculateMatchup(currentTypes);
        
        let abilityInfo = null;
        if (slot.isMega && baseData.mega && megaAbilityMap[slot.name]) abilityInfo = megaAbilityMap[slot.name];
        else if (!slot.isMega && abilityMap[slot.name]) abilityInfo = abilityMap[slot.name];

        if (!slot.isAbility) abilityInfo = null;
        activeMatchup = applyModifiers(activeMatchup, currentTypes, abilityInfo);

        return { types: currentTypes, weak: activeMatchup.weak, immune: activeMatchup.immune, resist: activeMatchup.resist, notes: activeMatchup.notes, abilityInfo: abilityInfo };
    }

    function getRecommendations(activeWeaknesses) {
        if (activeWeaknesses.length === 0) return [];
        let scores = [];
        for (let i = 0; i < pokemonNames.length; i++) {
            let name = pokemonNames[i];
            if (isPokemonInTeam(name)) continue; 
            
            let candTypes = pokedex[name].types;
            let candMatchup = calculateMatchup(candTypes);
            let candAbility = abilityMap[name] || null;
            candMatchup = applyModifiers(candMatchup, candTypes, candAbility);

            let score = 0;
            let covered = [];
            
            activeWeaknesses.forEach(w => {
                if (candMatchup.immune.includes(w)) { score += 3; covered.push(w + "免疫"); }
                else if (candMatchup.resist.includes(w)) { score += 1; covered.push(w + "抵抗"); }
            });

            if (score > 0) scores.push({ name: name, score: score, covered: covered, types: candTypes });
        }
        scores.sort((a, b) => b.score - a.score);
        return scores; 
    }

    function renderDataArea(index) {
        const dataBox = document.getElementById(`data-area-${index}`);
        const slot = team[index];
        const baseData = pokedex[slot.name];
        const activeData = getActiveData(slot);

        let contentHTML = `<h3 style="margin-top:0; color:white; font-size: 18px;">${slot.name}</h3>
                           <button class="btn-reselect" onclick="reselectPokemon(${index})">✖ 重新選擇</button>`;

        if (baseData.mega || baseData.megaForms) {
            contentHTML += `
            <label class="toggle-btn toggle-mega">
                <input type="checkbox" ${slot.isMega ? 'checked' : ''} onchange="toggleMega(${index}, this.checked)">
                <span style="color: #fbbf24; font-weight: bold;">✨ 觸發 Mega 進化</span>
            </label>`;
            
            if (slot.isMega && baseData.megaForms) {
                let currentForm = slot.megaForm || 'Y';
                contentHTML += `<div style="margin-top: 5px; margin-bottom: 10px; display: flex; gap: 15px; padding-left: 5px;">
                    <label style="color: #cbd5e1; font-size: 13px; cursor: pointer;">
                        <input type="radio" name="mega-form-${index}" value="X" ${currentForm === 'X' ? 'checked' : ''} onchange="changeMegaForm(${index}, 'X')"> Mega X (火/龍)
                    </label>
                    <label style="color: #cbd5e1; font-size: 13px; cursor: pointer;">
                        <input type="radio" name="mega-form-${index}" value="Y" ${currentForm === 'Y' ? 'checked' : ''} onchange="changeMegaForm(${index}, 'Y')"> Mega Y (火/飛行)
                    </label>
                </div>`;
            }
        }
        
        let currentAbilityInfo = (slot.isMega && baseData.mega && megaAbilityMap[slot.name]) ? megaAbilityMap[slot.name] : (!slot.isMega && abilityMap[slot.name] ? abilityMap[slot.name] : null);
        if (currentAbilityInfo) {
            contentHTML += `
            <label class="toggle-btn toggle-ability">
                <input type="checkbox" ${slot.isAbility ? 'checked' : ''} onchange="toggleAbility(${index}, this.checked)">
                <span style="color: var(--ability); font-weight: bold;">🌟 觸發防禦特性: ${currentAbilityInfo.name}</span>
            </label>`;
        }

        activeData.notes.forEach(note => { contentHTML += `<div class="weather-note">${note}</div><br>`; });

        contentHTML += `<div class="section-title">目前屬性</div><div class="tags">`;
        activeData.types.forEach(t => contentHTML += `<span class="type-${t}">${t}</span>`);
        
        contentHTML += `</div><div class="section-title">防禦弱點 (懼怕)</div><div class="tags">`;
        if(activeData.weak.length === 0) contentHTML += `<span class="tag-none">無明顯弱點</span>`;
        else activeData.weak.forEach(t => contentHTML += `<span class="tag-weak">${t}</span>`);
        
        contentHTML += `</div><div class="section-title">絕對防禦 (完全免疫)</div><div class="tags">`;
        if (activeData.immune.length === 0) contentHTML += `<span class="tag-none">無</span>`;
        else activeData.immune.forEach(t => contentHTML += `<span class="tag-immune">${t}</span>`);
        
        if (activeData.weak.length > 0) {
            let recs = getRecommendations(activeData.weak);
            if (recs.length > 0) {
                contentHTML += `<div class="recommendation-box">
                                <div style="font-size: 13px; color: #60a5fa; margin-bottom: 8px; font-weight: bold;">💡 AI 聯防搭檔推薦 (點擊自動入隊)：</div>
                                <select class="rec-select" onchange="if(this.value) { autoFillPokemon(this.value); this.value=''; }">
                                    <option value="">-- 點擊展開不會重複的推薦名單 --</option>`;
                recs.forEach(r => {
                    contentHTML += `<option value="${r.name}">➤ ${r.name} [${r.types.join('/')}] - 可掩護: ${r.covered.join(', ')}</option>`;
                });
                contentHTML += `</select></div>`;
            }
        }

        dataBox.innerHTML = contentHTML + `</div>`;
    }

    function analyzeTeam() {
        const analysisBox = document.getElementById('analysis-content');
        const activeMembers = team.filter(slot => slot.name !== "" && pokedex[slot.name]);
        
        if (activeMembers.length < 2) {
            analysisBox.innerHTML = `<div class="empty-state">請在上方選擇至少 2 隻寶可夢，系統將結合「屬性、特性、天氣」自動分析...</div>`;
            return;
        }

        let reportHTML = '';
        let weaknessCount = {};
        
        activeMembers.forEach(slot => {
            const data = getActiveData(slot);
            data.weak.forEach(w => {
                if (!weaknessCount[w]) weaknessCount[w] = [];
                weaknessCount[w].push(slot.name);
            });
        });

        for (let type in weaknessCount) {
            if (weaknessCount[type].length >= 2) {
                
                let threatList = [];
                pokemonNames.forEach(pName => {
                    let pData = pokedex[pName];
                    if (pData.types.includes(type) || (pData.mega && pData.mega.types.includes(type))) {
                        threatList.push(pName);
                    }
                });

                // 【核心更新】按照 T0/T1 環境熱門強度排序威脅清單
                threatList.sort((a, b) => (threatScores[b] || 50) - (threatScores[a] || 50));

                let threatHTML = '';
                if (threatList.length > 0) {
                    let displayThreats = threatList.slice(0, 12);
                    let threatTags = displayThreats.map(t => {
                        // 如果分數大於等於 90，加上高光特效 (熱門廚獸)
                        let isHot = (threatScores[t] || 50) >= 90;
                        return `<span class="threat-tag ${isHot ? 'threat-hot' : ''}">${t}${isHot ? ' 🔥' : ''}</span>`;
                    }).join('');
                    
                    if (threatList.length > 12) {
                        threatTags += `<span class="threat-tag" style="border-color: transparent; background: transparent;">...等共 ${threatList.length} 隻</span>`;
                    }
                    threatHTML = `<div style="font-size: 12px; color: #fca5a5; margin-top: 10px; border-top: 1px dashed rgba(239, 68, 68, 0.4); padding-top: 8px;">
                                    <strong>🚨 潛在威脅名單 (已優先列出對戰環境中最熱門的 Meta 角色)：</strong><br>${threatTags}
                                  </div>`;
                }

                reportHTML += `<div class="alert-danger">
                    <div style="margin-bottom: 5px;">⚠️ <strong>危險盲區：</strong> 隊伍中有 ${weaknessCount[type].length} 隻寶可夢 (${weaknessCount[type].join('、')}) 同時懼怕「${type}」屬性！</div>
                    ${threatHTML}
                </div>`;
            }
        }

        activeMembers.forEach(slotA => {
            const dataA = getActiveData(slotA);
            dataA.weak.forEach(weakness => {
                activeMembers.forEach(slotB => {
                    if (slotA.name === slotB.name) return;
                    const dataB = getActiveData(slotB);
                    if (dataB.immune.includes(weakness)) {
                        reportHTML += `<div class="alert-success">🛡️ <strong>完美掩護：</strong> 【${slotA.name}】懼怕的「${weakness}」攻擊，可由【${slotB.name}】無傷聯防 (完全免疫)！</div>`;
                    }
                });
            });
        });

        if (reportHTML === '') reportHTML = `<div class="empty-state" style="color: #cbd5e1;">✅ 目前陣容沒有嚴重的屬性重疊盲區！<br>（但目前也缺乏能互相完美「免疫」掩護的組合）</div>`;
        analysisBox.innerHTML = reportHTML;
    }

    };
    const megaSpeeds = {
        "妙蛙花": 80, "噴火龍": 100, "水箭龜": 78, "大針蜂": 145, "大比鳥": 121, "胡地": 150, "呆殼獸": 30, "耿鬼": 130, "袋獸": 100, "寶石海星": 120, "凱羅斯": 105, "暴鯉龍": 81, "化石翼龍": 150, "電龍": 45, "大鋼蛇": 30, "巨鉗螳螂": 75, "赫拉克羅斯": 75, "盔甲鳥": 110, "黑魯加": 115, "班基拉斯": 71, "沙奈朵": 100, "勾魂眼": 20, "波士可多拉": 50, "恰雷姆": 100, "雷電獸": 135, "巨牙鯊": 105, "噴火駝": 20, "七夕青鳥": 80, "詛咒娃娃": 75, "阿勃梭魯": 115, "冰鬼護": 100, "烈咬陸鯊": 92, "路卡利歐": 112, "暴雪王": 30, "艾路雷朵": 110, "差不多娃娃": 50,
        "長耳兔": 135, "甲賀忍蛙": 142, "皮可西": 70, "妖火紅狐": 134, "炎武王": 75, "永恆之花花葉蒂": 102, "龍頭地鼠": 103, "快龍": 100, "雪妖女": 120, "水晶燈火靈": 90, "布里卡隆": 44, "晶光花": 101, "超能妙喵": 124, "好勝毛蟹": 33
    };

    let speedDuelState = { left: { name: "", isMega: false }, right: { name: "", isMega: false } };

    function setupSpeedSearch(side) {
        const input = document.getElementById(`speed-input-${side}`);
        const dropdown = document.getElementById(`speed-dropdown-${side}`);
        
        function updateList() {
            dropdown.innerHTML = '';
            const val = input.value.trim().toLowerCase();
            let count = 0;
            for (let i = 0; i < pokemonNames.length; i++) {
                if (pokemonNames[i].toLowerCase().includes(val) || val === '') {
                    const div = document.createElement('div');
                    div.className = 'dropdown-item';
                    let name = pokemonNames[i];
                    if (val !== "") {
                        const regex = new RegExp(`(${val})`, "gi");
                        name = name.replace(regex, "<span style='color:var(--accent);'>$1</span>");
                    }
                    div.innerHTML = name;
                    div.onclick = function() { selectSpeedPokemon(side, pokemonNames[i]); };
                    dropdown.appendChild(div);
                    count++;
                }
            }
            dropdown.style.display = count > 0 ? 'block' : 'none';
        }

        let isComposing = false;
        input.addEventListener('compositionstart', () => isComposing = true);
        input.addEventListener('compositionend', () => { isComposing = false; updateList(); });
        input.addEventListener('input', () => { if(!isComposing) updateList(); });
        input.addEventListener('focus', updateList);
    }

    setupSpeedSearch('left');
    setupSpeedSearch('right');

    window.selectSpeedPokemon = function(side, name) {
        speedDuelState[side].name = name;
        document.getElementById(`speed-input-${side}`).parentElement.style.display = 'none';
        document.getElementById(`speed-data-${side}`).style.display = 'flex';
        document.getElementById(`speed-name-${side}`).innerHTML = name;
        
        document.getElementById(`speed-mega-${side}`).checked = false;
        document.getElementById(`speed-effort-${side}`).value = "max+";
        document.getElementById(`speed-stage-${side}`).value = "0";
        document.getElementById(`speed-ability-${side}`).value = "1";
        document.getElementById(`speed-para-${side}`).checked = false;

        const baseData = pokedex[name];
        document.getElementById(`speed-mega-${side}`).parentElement.style.display = baseData.mega ? 'flex' : 'none';

        calcSpeedDuel();
    };

    window.reselectSpeedPokemon = function(side) {
        speedDuelState[side].name = "";
        document.getElementById(`speed-input-${side}`).parentElement.style.display = 'block';
        document.getElementById(`speed-input-${side}`).value = '';
        document.getElementById(`speed-data-${side}`).style.display = 'none';
        calcSpeedDuel();
    };

    window.calcSpeedDuel = function() {
        let resultDiv = document.getElementById('speed-result');
        let statsDiv = document.getElementById('speed-stats');

        if (!speedDuelState.left.name || !speedDuelState.right.name) {
            resultDiv.innerHTML = "請選擇雙方寶可夢以進行比對";
            resultDiv.style.color = "#94a3b8";
            statsDiv.innerHTML = "";
            return;
        }

        speedDuelState.left.isMega = document.getElementById('speed-mega-left').checked;
        speedDuelState.right.isMega = document.getElementById('speed-mega-right').checked;

        function getFinalSpeed(side) {
            let name = speedDuelState[side].name;
            let isMega = speedDuelState[side].isMega;
            let baseSpeed = (isMega && megaSpeeds[name]) ? megaSpeeds[name] : (baseSpeeds[name] || 80);
            
            let effort = document.getElementById(`speed-effort-${side}`).value;
            let stat = baseSpeed + 20; 
            if (effort === 'max+') stat = Math.floor((baseSpeed + 52) * 1.1);
            else if (effort === 'max') stat = baseSpeed + 52;
            else if (effort === 'min') stat = Math.floor((baseSpeed + 20) * 0.9); // 無個體值差異，基礎保持20

            let stage = parseInt(document.getElementById(`speed-stage-${side}`).value);
            let stageMulti = 1;
            if (stage > 0) stageMulti = (2 + stage) / 2;
            else if (stage < 0) stageMulti = 2 / (2 - stage);

            let finalSpeed = Math.floor(stat * stageMulti);
            
            let abilityMulti = parseFloat(document.getElementById(`speed-ability-${side}`).value);
            finalSpeed = Math.floor(finalSpeed * abilityMulti);

            let tailwind = document.getElementById(`speed-tailwind-${side}`).checked;
            if (tailwind) finalSpeed = Math.floor(finalSpeed * 2);

            let para = document.getElementById(`speed-para-${side}`).checked;
            if (para) finalSpeed = Math.floor(finalSpeed * 0.5);

            return { speed: finalSpeed, base: baseSpeed };
        }

        let leftData = getFinalSpeed('left');
        let rightData = getFinalSpeed('right');
        let isTrickRoom = document.getElementById('speed-trickroom').checked;

        statsDiv.innerHTML = `🟦 我方實戰速度: <span style="font-size:20px; color:#bfdbfe; font-weight:bold;">${leftData.speed}</span> (種族值: ${leftData.base}) ｜ 🟥 敵方實戰速度: <span style="font-size:20px; color:#fecaca; font-weight:bold;">${rightData.speed}</span> (種族值: ${rightData.base})`;

        if (leftData.speed === rightData.speed) {
            resultDiv.innerHTML = "⚖️ 速度平手！(同速抽速)";
            resultDiv.style.color = "#cbd5e1";
        } else {
            let leftWins = leftData.speed > rightData.speed;
            if (isTrickRoom) leftWins = !leftWins;

            if (leftWins) {
                resultDiv.innerHTML = "🚀 【我方】將先手行動！";
                resultDiv.style.color = "#60a5fa";
            } else {
                resultDiv.innerHTML = "🚨 【敵方】將先手行動！";
                resultDiv.style.color = "#f87171";
            }
        }
    };
</script>
</body>
</html>
